<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065F46"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="-10" cy="-10" r="60" fill="white" fill-opacity="0.05"/>
  <circle cx="220" cy="220" r="80" fill="white" fill-opacity="0.05"/>
  <circle cx="180" cy="30" r="30" fill="white" fill-opacity="0.04"/>
  <!-- Person silhouette: head -->
  <circle cx="100" cy="76" r="28" fill="white" fill-opacity="0.55"/>
  <!-- Person silhouette: body/shoulders -->
  <ellipse cx="100" cy="152" rx="44" ry="36" fill="white" fill-opacity="0.55"/>
</svg>
