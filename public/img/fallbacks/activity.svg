<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064E3B"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="-25" cy="-25" r="90" fill="white" fill-opacity="0.04"/>
  <circle cx="440" cy="270" r="110" fill="white" fill-opacity="0.04"/>
  <circle cx="360" cy="25" r="40" fill="white" fill-opacity="0.03"/>
  <!-- Calendar icon -->
  <g transform="translate(200,115)" fill="none" stroke="white" stroke-opacity="0.45" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Calendar box -->
    <rect x="-50" y="-38" width="100" height="86" rx="8"/>
    <!-- Top bar -->
    <rect x="-50" y="-38" width="100" height="28" rx="8" fill="white" fill-opacity="0.12" stroke="none"/>
    <!-- Date pins -->
    <line x1="-24" y1="-48" x2="-24" y2="-28"/>
    <line x1="24" y1="-48" x2="24" y2="-28"/>
    <!-- Grid dots (days) -->
    <circle cx="-30" cy="10" r="4" fill="white" fill-opacity="0.4" stroke="none"/>
    <circle cx="-10" cy="10" r="4" fill="white" fill-opacity="0.4" stroke="none"/>
    <circle cx="10" cy="10" r="4" fill="white" fill-opacity="0.6" stroke="none"/>
    <circle cx="30" cy="10" r="4" fill="white" fill-opacity="0.4" stroke="none"/>
    <circle cx="-30" cy="30" r="4" fill="white" fill-opacity="0.4" stroke="none"/>
    <circle cx="-10" cy="30" r="4" fill="white" fill-opacity="0.4" stroke="none"/>
  </g>
  <!-- Label -->
  <text x="200" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="white" fill-opacity="0.35">AGENDA</text>
</svg>
