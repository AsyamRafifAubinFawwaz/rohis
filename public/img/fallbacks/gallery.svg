<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064E3B"/>
      <stop offset="100%" style="stop-color:#065F46"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="-20" cy="-20" r="90" fill="white" fill-opacity="0.04"/>
  <circle cx="440" cy="270" r="110" fill="white" fill-opacity="0.04"/>
  <circle cx="355" cy="28" r="42" fill="white" fill-opacity="0.03"/>
  <!-- Photo/image icon -->
  <g transform="translate(200,115)" fill="none" stroke="white" stroke-opacity="0.45" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="-55" y="-44" width="110" height="88" rx="8"/>
    <!-- Mountain shape (landscape) -->
    <polyline points="-40,28 -10,-10 18,18 32,-6 50,28"/>
    <!-- Sun circle -->
    <circle cx="-24" cy="-12" r="12"/>
  </g>
  <!-- Label -->
  <text x="200" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="white" fill-opacity="0.35">GALERI</text>
</svg>
